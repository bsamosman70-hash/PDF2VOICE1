version: "3.9"

# Production stack:
#   nginx  → serves React SPA + proxies /api to FastAPI
#   api    → FastAPI (4 uvicorn workers)
#   worker → Celery (documents + tts queues)
#   flower → Celery monitoring UI
#   postgres, redis → data tier

services:

  # ─── Data tier ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdf2voice}
      POSTGRES_USER: ${POSTGRES_USER:-pdf2voice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdf2voice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally in production; only internal network access

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application tier ────────────────────────────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pdf2voice}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pdf2voice}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pdf2voice}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pdf2voice}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ─── Frontend / ingress ───────────────────────────────────────────────────────

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment after running ssl-setup.sh:
      # - "443:443"
    volumes:
      # Certs are mounted here after ssl-setup.sh runs
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─── Observability ────────────────────────────────────────────────────────────

  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
